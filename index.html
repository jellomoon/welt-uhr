<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Galada&family=Karla:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
    <title>World Clock 🕑</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>

      <form action="">
        <select name="city" id="city">
          <option value="">Choose a city..</option>
          <option value="berlin">Berlin</option>
          <option value="teheran">Teheran</option>
          <option value="aukland">Aukland</option>
        </select>
      </form>

      <div class="city">
        <div>
          <h2>Los Angeles 🌴</h2>
          <div class="date">June 13th 2027</div>
        </div>
        <div class="time">13:09:54</div>
      </div>
      <div class="city">
        <div>
          <h2>Tokyo 🌸</h2>
          <div class="date">June 13th 2027</div>
        </div>
        <div class="time">13:09:54</div>
      </div>
    </div>
    </div>

    <script src="javascript/index.js"></script>
  </body>
</html>
