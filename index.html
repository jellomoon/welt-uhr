  <body>
    <div class="container">
      <h1>World Clock</h1>

        <select id="city">
          <option value="">Choose a city..</option>
          <option value="current">My location</option>
          <option value="Europe/London">London</option>
          <option value="Asia/Tehran">Tehran</option>
          <option value="Pacific/Auckland">Auckland</option>
          <option value="America/New_York">New York</option>
        </select>

    <div id="city-replace">
        <div class="city" id="los-angeles">
          <div>
            <h2>Los Angeles ☀️</h2>
            <div class="date"></div>
          </div>
        <div class="time"></div>
        </div>
      <div class="city" id="berlin">
        <div>
          <h2>Berlin 🐻</h2>
          <div class="date"></div>
        </div>
        <div class="time"></div>
      </div>
      <div class="city" id="tokyo">
        <div>
          <h2>Tokyo 🌸</h2>
          <div class="date"></div>
        </div>
        <div class="time"></div>
      </div>
    </div>
    </div>
