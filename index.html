<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>World Clock 🕑</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>

      <form action="">
        <select name="city" id="city">
          <option value="">Choose city</option>
          <option value="berlin">Berlin</option>
          <option value="teheran">Teheran</option>
          <option value="aukland">Aukland</option>
        </select>
      </form>

      <div class="city">
        <h2>Los Angeles 🌴</h2>
        <div class="date">June 13th 2027</div>
        <div class="time">13:09:54</div>
      </div>
      <div class="city">
        <h2>Tokyo 🌸</h2>
        <div class="date">June 13th 2027</div>
        <div class="time">13:09:54</div>
      </div>
    </div>
    <footer>
      Project coded with 💟 by
      <a href="https://github.com/jellomoon" target="_blank">Mona Beyersdorf</a>
      | Open sourced on
      <a href="https://github.com/jellomoon/welt-uhr" target="_blank">GitHub</a>
    </footer>
    <script src="javascript/index.js"></script>
  </body>
</html>
